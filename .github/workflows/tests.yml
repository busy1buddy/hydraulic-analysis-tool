name: Test Suite
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements_desktop.txt
      - name: Install dependencies
        run: pip install -r requirements_desktop.txt
      - name: Run tests (headless)
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -m pytest tests/ -k "not transient" -q --tb=short
